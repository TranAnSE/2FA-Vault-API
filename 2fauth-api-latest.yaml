      type: object
      description: |-
        An auto-backup destination as returned by the API. Credentials are never exposed; only a
        masked summary is returned to identify the configured connection.
      properties:
        id:
          type: integer
          minimum: 1
          description: ID of the destination
        label:
          type: string
          maxLength: 64
          description: Human-friendly label for the destination
        type:
          type: string
          enum:
            - local
            - s3
            - webdav
            - email
          description: The destination transport type
        is_active:
          type: boolean
          description: Whether the destination participates in scheduled auto-backups
          default: true
        last_run_at:
          type:
            - string
            - 'null'
          format: date-time
          description: ISO8601 timestamp of the last backup run, or null if never run
        last_run_status:
          type:
            - string
            - 'null'
          enum:
            - success
            - failed
            - 'null'
          description: Outcome of the last backup run, or null if never run
        config_summary:
          type:
            - string
            - 'null'
          description: Masked, non-sensitive summary of the connection (e.g. bucket name, host). Secrets are omitted.
      required:
        - id
        - label
        - type
        - is_active
    UserBackupDestinationStore:
      title: Store user backup destination schema
      type: object
      description: Expected information to create or update a backup destination. Secrets are encrypted at rest.
      properties:
        label:
          type: string
          maxLength: 64
          description: Human-friendly label for the destination
        type:
          type: string
          enum:
            - local
            - s3
            - webdav
            - email
          description: The destination transport type
        is_active:
          type: boolean
          default: true
          description: Whether the destination participates in scheduled auto-backups
        config:
          type: object
          description: Transport-specific connection settings. Secrets (keys, passwords, tokens) are accepted here and encrypted at rest.
          additionalProperties: true
          properties:
            path:
              type:
                - string
                - 'null'
              description: 'local: absolute or relative path on the server filesystem'
            endpoint:
              type:
                - string
                - 'null'
              description: 's3: endpoint URL (omit or leave empty for AWS S3; set for MinIO, Backblaze B2, Wasabi, etc.)'
            bucket:
              type:
                - string
                - 'null'
              description: 's3: bucket name'
            region:
              type:
                - string
                - 'null'
              description: 's3: region'
            key:
              type:
                - string
                - 'null'
              description: 's3: access key ID'
            secret:
              type:
                - string
                - 'null'
              description: 's3: secret access key (write-only; never returned)'
            prefix:
              type:
                - string
                - 'null'
              description: 's3: key/path prefix for stored objects'
            url:
              type:
                - string
                - 'null'
              description: 'webdav: server base URL'
            username:
              type:
                - string
                - 'null'
              description: 'webdav: username'
            password:
              type:
                - string
                - 'null'
              description: 'webdav: password (write-only; never returned)'
      required:
        - label
        - type
        - config
    SecureNote:
      title: Secure note schema
      type: object
      description: |-
        A secure note. The title and content are end-to-end encrypted by the client and stored as
        opaque ciphertext; the server cannot read them.
      properties:
        id:
          type: integer
          minimum: 1
          description: ID of the note
        title:
          type: string
          description: Encrypted title ciphertext (opaque to the server)
        content:
          type:
            - string
            - 'null'
          description: Encrypted content ciphertext (opaque to the server)
        content_type:
          type: string
          enum:
            - plain
            - markdown
          description: Hint set by the client describing how to render the decrypted content
          default: plain
        is_pinned:
          type: boolean
          description: Whether the note is pinned to the top of the list
          default: false
        created_at:
          type: string
          format: date-time
          description: ISO8601 timestamp of creation
        updated_at:
          type: string
          format: date-time
          description: ISO8601 timestamp of the last update
      required:
        - id
        - title
        - content_type
        - is_pinned
        - created_at
        - updated_at
    SecureNoteStore:
      title: Store secure note schema
      type: object
      description: Expected information to create or update a secure note. Title and content are end-to-end encrypted by the client.
      properties:
        title:
          type: string
          description: Encrypted title ciphertext
        content:
          type:
            - string
            - 'null'
          description: Encrypted content ciphertext
        content_type:
          type: string
          enum:
            - plain
            - markdown
          default: plain
          description: Hint describing how to render the decrypted content
        is_pinned:
          type: boolean
          default: false
          description: Whether the note is pinned
      required:
        - title
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
