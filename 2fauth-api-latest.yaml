openapi: 3.1.0
info:
  title: 2FA-Vault API
  version: 1.11.0
  description: |-
    This is the definition (following OpenAPI 3.1 specification) of the REST API of 2FA-Vault, a personal fork of [2FA-Vault](https://github.com/TranAnSE/2FA-Vault) for managing Two-Factor Authentication (2FA) accounts and generating their security passwords.

    2FA-Vault keeps the upstream 2FA-Vault account, group, icon, QR code, user preference, setting, and user-management endpoints, and adds fork-specific endpoints for encrypted vault metadata, encrypted account sync, encrypted backups, web push subscriptions, teams, tags, vaults, webhooks, team activity logs, emergency access, and additional administrator user management.
  contact:
    name: TranAnSE
    url: 'https://github.com/TranAnSE/2FA-Vault'
  license:
    name: AGPL-3.0
    url: 'https://www.gnu.org/licenses/agpl-3.0.en.html'
servers:
  - url: 'https://example.test'
    description: Replace with your 2FA-Vault instance URL
paths:
  /api/v1/twofaccounts:
    get:
      summary: Get all 2FA accounts
      tags:
        - twofaccounts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/2FAccountCollection'
              examples:
                Example without secret:
                  value:
                    - id: 1
                      group_id: 1
                      service: MySite
                      account: john.doe
                      icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                      otp_type: totp
                      digits: 6
                      algorithm: sha1
                      period: 30
                      counter: null
                    - id: 2
                      group_id: 1
                      service: MyOtherSite
                      account: john.doe
                      icon: 1pawLLuMx4bOQkrZxM5CIQyFtVq25dtgMkU3rtST.png
                      otp_type: hotp
                      digits: 8
                      algorithm: sha1
                      period: null
                      counter: 15
                Example with secret:
                  value:
                    - id: 1
                      group_id: 1
                      service: MySite
                      account: john.doe
                      icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                      otp_type: totp
                      digits: 6
                      algorithm: sha1
                      secret: GJTGC5LUNA
                      period: 30
                      counter: null
                    - id: 2
                      group_id: 1
                      service: MyOtherSite
                      account: john.doe
                      icon: 1pawLLuMx4bOQkrZxM5CIQyFtVq25dtgMkU3rtST.png
                      otp_type: hotp
                      digits: 8
                      algorithm: sha1
                      secret: QD5TG6UUJ89F44GV
                      period: null
                      counter: 15
                Example with otp object:
                  value:
                    - id: 1
                      group_id: 1
                      service: MySite
                      account: john.doe
                      icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                      otp_type: totp
                      digits: 6
                      algorithm: sha1
                      period: 30
                      counter: null
                      otp:
                        password: '045698'
                        generated_at: 1701788671
                    - id: 2
                      group_id: 1
                      service: MyOtherSite
                      account: john.doe
                      icon: 1pawLLuMx4bOQkrZxM5CIQyFtVq25dtgMkU3rtST.png
                      otp_type: hotp
                      digits: 8
                      algorithm: sha1
                      period: null
                      counter: 15
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      operationId: get-twofaccounts
      description: Find all 2FA accounts of the authenticated user
      parameters:
        - $ref: '#/components/parameters/withSecret'
        - schema:
            type: string
            example: '1,20,9,456'
          in: query
          name: ids
          description: Comma-separated list of ids to filter returned 2FA accounts
        - schema:
            type: boolean
          in: query
          name: withOtp
          description: Set to true (or 1) to append an OTP object to the returned 2FA accounts of type TOTP
        - schema:
            type: string
          in: query
          name: q
          description: Full-text search on service and account name
        - schema:
            type: string
            example: 'totp,hotp,steamtotp'
          in: query
          name: types
          description: Comma-separated OTP types to filter (totp, hotp, steamtotp)
        - schema:
            type: string
            example: 'sha1,sha256,sha512'
          in: query
          name: algorithms
          description: Comma-separated algorithms to filter
        - schema:
            type: string
            example: '6,7,8'
          in: query
          name: digits
          description: Comma-separated digit counts to filter
        - schema:
            type: integer
          in: query
          name: group_id
          description: Filter by group ID
        - schema:
            type: string
            example: '1,2,3'
          in: query
          name: tags
          description: Comma-separated tag IDs to filter
        - schema:
            type: string
            enum:
              - and
              - 'or'
            default: 'or'
          in: query
          name: tag_mode
          description: Tag filter mode (and = all tags, or = any tag)
        - schema:
            type: boolean
          in: query
          name: encrypted
          description: Filter by encryption status
        - schema:
            type: string
            format: date-time
          in: query
          name: last_used_from
          description: Filter accounts used after this date
        - schema:
            type: string
            format: date-time
          in: query
          name: last_used_to
          description: Filter accounts used before this date
        - schema:
            type: string
            enum:
              - service
              - account
              - created_at
              - last_used_at
              - order_column
          in: query
          name: sort
          description: Sort field
        - schema:
            type: string
            enum:
              - asc
              - desc
          in: query
          name: sort_dir
          description: Sort direction
    parameters: []
    post:
      summary: Create 2FA account
      tags:
        - twofaccounts
      operationId: post-twofaccounts
      description: Creates a new 2FA account for the authenticated user
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/2FAccountStore'
                - $ref: '#/components/schemas/OtpauthUri'
            examples:
              Example with properties:
                value:
                  service: MySite
                  account: john.doe
                  icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                  otp_type: totp
                  digits: 6
                  algorithm: sha1
                  secret: GJTGC5LUNA
                  period: 30
                  counter: null
              Example with URI:
                value:
                  uri: 'otpauth://totp/MySite:john.doe?secret=GJTGC5LUNA&issuer=MySite&period=30&algorithm=sha1&digits=6&image=https://www.example.com/image.png'
        description: |-
          This endpoint accepts 2 different body schemas to create a new 2FA account:
          - A full JSON object with some properties
          - An URI based on the otpauth format
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/2FAccountRead'
              examples:
                Example:
                  value:
                    id: 1
                    group_id: 1
                    service: MySite
                    account: john.doe
                    icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                    otp_type: totp
                    secret: GJTGC5LUNA
                    digits: 6
                    algorithm: sha1
                    period: 30
                    counter: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      parameters: []
    delete:
      summary: Mass delete 2FA accounts
      operationId: delete-twofaccounts
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
      tags:
        - twofaccounts
      description: |-
        Mass deletes 2FA accounts of the authenticated user matching the IDs passed as query parameter.

        A `204 — No Content` response will be returned even if some resources no longer exist before delete.
      parameters:
        - $ref: '#/components/parameters/ids'
  /api/v1/twofaccounts/encrypted:
    get:
      summary: Get encrypted 2FA accounts
      tags:
        - twofaccounts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encrypted2FAccountCollection'
              examples:
                Example:
                  value:
                    - id: 1
                      group_id: 1
                      service: MySite
                      account: john.doe
                      otp_type: totp
                      secret: '{"ciphertext":"Y2lwaGVydGV4dA==","iv":"aW5pdGlhbGl6YXRpb25WZWN0b3I=","authTag":"YXV0aFRhZw=="}'
                      encrypted: true
                      digits: 6
                      algorithm: sha1
                      period: 30
                      counter: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      operationId: get-twofaccounts-encrypted
      description: Returns encrypted 2FA accounts of the authenticated user without server-side decryption. The secret field contains the raw ciphertext JSON string generated client-side.
    parameters: []
  /api/v1/twofaccounts/count:
    get:
      summary: Count 2FA accounts
      tags:
        - twofaccounts
      operationId: get-twofaccounts-count
      description: Returns the number of 2FA accounts owned by the authenticated user.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    minimum: 0
                    example: 42
                required:
                  - count
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    parameters: []
  '/api/v1/twofaccounts/{id}':
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Find 2FA account by ID
      tags:
        - twofaccounts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/2FAccountRead'
              examples:
                Example without secret:
                  value:
                    id: 1
                    group_id: 1
                    service: MySite
                    account: john.doe
                    icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                    otp_type: totp
                    digits: 6
                    algorithm: sha1
                    period: 30
                    counter: null
                Example with secret:
                  value:
                    id: 1
                    group_id: 1
                    service: MySite
                    account: john.doe
                    icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                    otp_type: totp
                    secret: GJTGC5LUNA
                    digits: 6
                    algorithm: sha1
                    period: 30
                    counter: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: get-twofaccounts-id
      description: Returns a single 2FA account of the authenticated user
      parameters:
        - $ref: '#/components/parameters/withSecret'
    put:
      summary: Update 2FA account
      operationId: put-twofaccounts-id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/2FAccountRead'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
      description: Updates a 2FA account of the authenticated user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/2FAccountUpdate'
            examples:
              Example:
                value:
                  service: MySite
                  account: john.doe
                  icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                  otp_type: totp
                  digits: 6
                  algorithm: sha1
                  secret: GJTGC5LUNA
                  period: 30
      tags:
        - twofaccounts
    delete:
      summary: Delete 2FA account
      operationId: delete-twofaccounts-id
      responses:
        '204':
          description: No Content
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      tags:
        - twofaccounts
      description: Deletes a 2FA account of the authenticated user
  '/api/v1/twofaccounts/{id}/qrcode':
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Encode a 2FA account in a QR code
      tags:
        - qrcode
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                description: ''
                type: object
                x-examples:
                  example-1:
                    qrcode: 'data:image/png;base64,'
                properties:
                  qrcode:
                    type: string
                    example: 'data:image/png;base64,'
                required:
                  - qrcode
              examples:
                Example:
                  value:
                    qrcode: 'data:image/png;base64,'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: get-twofaccounts-id-qrcode
      description: Returns a QR code that represents a 2FA account owned by the authenticated user
  '/api/v1/twofaccounts/health/summary':
    get:
      summary: Vault health summary
      tags:
        - account health
      security:
        - Bearer-Auth: []
      responses:
        '200':
          description: Aggregated health across the authenticated user's accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountHealthSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: get-twofaccounts-health-summary
      description: >-
        Computes per-grade counts, average server-visible health score, and the
        list of weak account ids (grade C or below). Uses server-visible metadata
        only; safe under E2EE.
  '/api/v1/twofaccounts/{id}/health':
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Account health score
      tags:
        - account health
      security:
        - Bearer-Auth: []
      responses:
        '200':
          description: Per-account health score
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountHealth'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: get-twofaccounts-id-health
      description: >-
        Security health score derived from server-visible metadata (algorithm,
        digits, period, last-used freshness). Safe under E2EE.
  '/api/v1/breach/check-email':
    post:
      summary: Check an email against known breaches
      tags:
        - breach monitoring
      security:
        - Bearer-Auth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                use_account_email:
                  type: boolean
                  description: When true, use the authenticated user's own email (email field ignored).
      responses:
        '200':
          description: Breach status for the email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreachResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Breach monitoring is disabled (opt-in preference not set)
      operationId: post-breach-check-email
      description: >-
        Sends the email to HaveIBeenPwned. HARD-gated behind the user's
        breachMonitoring preference (off by default) for privacy.
  '/api/v1/breach/check-service':
    get:
      summary: Check a service/domain against known breaches
      tags:
        - breach monitoring
      security:
        - Bearer-Auth: []
      parameters:
        - name: service
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Breach status for the service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreachResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
      operationId: get-breach-check-service
      description: >-
        Uses the public HIBP breaches list; sends only a public service/domain
        name. No opt-in required.
  '/api/v1/twofaccounts/{id}/otp':
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      summary: Get a One-Time password
      tags:
        - one-time password
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Otp'
              examples:
                Example for TOTP:
                  value:
                    password: '225897'
                    otp_type: totp
                    generated_at: 1631304659
                    period: 30
                Example for HOTP:
                  value:
                    password: '225897'
                    otp_type: hotp
                    counter: 5
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      operationId: get-twofaccounts-id-otp
      description: Returns a fresh One-Time Password for the 2FA account of the authenticated user matching the specified ID
  '/api/v1/twofaccounts/{id}/counter':
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      summary: Update HOTP counter
      tags:
        - twofaccounts
      operationId: patch-twofaccounts-id-counter
      description: Updates a HOTP account counter without revalidating or rewriting the encrypted secret. The new counter must be greater than the current counter.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                counter:
                  type: integer
                  minimum: 0
                  example: 16
              required:
                - counter
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/2FAccountRead'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/v1/twofaccounts/otp:
    parameters: []
    post:
      summary: Get a One-Time password
      tags:
        - one-time password
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/2FAccountStore'
                - $ref: '#/components/schemas/OtpauthUri'
            examples: {}
        description: |-
          This endpoint accepts 2 different body schemas to generate a One-Time Password:
          - A JSON object with all properties to define a 2FA account
          - An otpauth URI
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Otp'
              examples:
                Eexample for TOTP:
                  value:
                    password: '225897'
                    otp_type: totp
                    generated_at: 1631304659
                    period: 30
                Example for HOTP:
                  value:
                    password: '225897'
                    otp_type: hotp
                    counter: 5
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
      operationId: post-twofaccounts-otp
      description: Returns a fresh One-Time password with related parameters for account defined by the provided data
  /api/v1/twofaccounts/migration:
    post:
      summary: Convert a migration resource
      operationId: post-twofaccounts-migration
      responses:
        '200':
          description: |-
            Ok

            > 2FA accounts are always returned with an ID between -2 and 0:
            > - `id: -2` means the returned account does not reflect the exact submited data because those data are invalid or unreadable. You should not used this account definition.
            > - `id: -1` means the returned account already exists in the authenticated user accounts in database. It's a valid account but probably useless you should discard.
            > - `id: 0` means the returned account is successfully migrated and is valid
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/2FAccountMigrated'
              examples:
                Example:
                  value:
                    - id: 0
                      group_id: null
                      service: MySite
                      account: john.doe
                      icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                      otp_type: totp
                      secret: GJTGC5LUNA
                      digits: 6
                      algorithm: sha1
                      period: 30
                      counter: null
                    - id: -1
                      group_id: null
                      service: MySite
                      account: john.doe
                      icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
                      otp_type: totp
                      secret: GJTGC5LUNA
                      digits: 6
                      algorithm: sha1
                      period: 30
                      counter: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/ServerError'
      description: |-
        Use this endpoint to convert exported 2FAs from another 2FA app to a list of 2FA resources you can POST using the API to create new 2FA accounts.

        > This endpoint does not store anything in database.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                payload:
                  type: string
                  description: The migration payload
              required:
                - payload
            examples:
              Example for Google Authenticator:
                value:
                  payload: 'otpauth-migration://offline?data=w0SnrWITY/RFhILYWNjb3VudF9iaXMaC3NlcnZpY2VfYmlzIAEoATACEAEYASAA'
                  withSecret: true
              Example for a list of otpauth URIs:
                value:
                  payload: |-
                    otpauth://totp/dropbox:john?secret=T5THFHVVRSDF4AWS
                    otpauth://totp/dropbox:jane?secret=A4GRFHVVRBGY7UIW
                  withSecret: true
              Example for a JSON payload:
                value:
                  payload: |-
                    {
                    "version":1,
                    "header":{
                    "slots":null,
                    "params":null
                    },
                    "db":{
                    "version":2,
                    "entries":[
                    {
                    "type":"totp",
                    "uuid":"5be1c189-240d-5fe1-930b-a78xb669zd86",
                    "name":"JohnDOE",
                    "issuer":"Facebook",
                    "note":"",
                    "icon":null,
                    "info":{
                    "secret":"A4GRFTVVRBGY7UIW",
                    "algo":"SHA1",
                    "digits":6,
                    "period":30,
                    "counter":30
                    }
                    }
                    ]
                    }
                    }
                  withSecret: true
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The migration file
              required:
                - file
            examples:
              Example:
                value:
                  file: string
        description: |-
          This endpoint accepts 2 different body schemas:
          - A JSON object which contain a migration payload. Typically the content of an export file or the decoded content of a QR code.
          - A multi-part/form-data to submit an export file directly
      tags:
        - twofaccounts
      parameters:
        - $ref: '#/components/parameters/withSecret'
    parameters: []
  /api/v1/twofaccounts/preview:
    post:
      summary: Preview 2FA account
      operationId: post-twofaccounts-preview
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/2FAccountRead'
              examples:
                Example:
                  value:
                    id: 1
                    group_id: 1
                    service: MySite
