          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  '/api/v1/secure-notes/{id}/pin':
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      summary: Toggle secure note pin
      tags:
        - secure-notes
      operationId: post-secure-notes-id-pin
      description: Toggles the pinned state of a secure note.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecureNote'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /metrics:
    get:
      summary: Prometheus metrics
      tags:
        - metrics
      operationId: get-metrics
      description: |-
        Returns application metrics in Prometheus text exposition format (version 0.0.4).

        This endpoint is NOT protected by the standard Bearer-Auth scheme. Access is granted when either:
          * the request originates from an IP that matches an entry in the `METRICS_ALLOWED_IPS` allowlist (comma-separated CIDRs or single IPs), or
          * the request carries an `Authorization: Bearer <METRICS_TOKEN>` header matching the configured `METRICS_TOKEN`.

        When neither `METRICS_ALLOWED_IPS` nor `METRICS_TOKEN` is configured, the endpoint returns 404 (disabled).
      security: []
      responses:
        '200':
          description: OK
          content:
            text/plain; version=0.0.4:
              schema:
                type: string
                description: Prometheus text exposition format
              examples:
                Example:
                  value: |-
                    # HELP twofaccounts_total Total number of 2FA accounts
                    # TYPE twofaccounts_total gauge
                    twofaccounts_total 42
                    # HELP http_requests_total Total HTTP requests
                    # TYPE http_requests_total counter
                    http_requests_total{status="200"} 1337
        '404':
          description: Not Found (metrics endpoint disabled)
components:
  schemas:
    2FAccountStore:
      title: Store 2FAccount schema
      type: object
      description: Expected informations to create or preview a 2FA account
      examples:
        - service: MySite
          account: john.doe
          icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
          otp_type: totp
          secret: GJTGC5LUNA
          digits: 6
          algorithm: sha1
          period: 30
          counter: null
          group_id: 1
        - service: MySite
          account: john.doe
          icon: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
          otp_type: hotp
          secret: GJTGC5LUNA
          digits: 6
          algorithm: sha1
          period: null
          counter: 0
          group_id: null
        - account: john.doe
          otp_type: totp
      properties:
        service:
          type:
            - string
            - 'null'
          description: The Issuer of the 2FA account
          example: MySite
          pattern: '^[^:]+$'
        account:
          type: string
          description: The Label of the 2FA account
          example: john.doe
          pattern: '^[^:]+$'
        icon:
          type:
            - string
            - 'null'
          example: ZMlzmrPsrWSWVt4fZouFVrt2w38D0PnXiyZQvDcY.png
          description: The filename of the icon which decorate the 2FA account
        otp_type:
          type: string
          enum:
            - totp
            - hotp
            - steamtotp
          example: totp
          description: The type of 2FA account
        secret:
          type:
            - string
            - 'null'
          description: A base32 encoded string used by the cryptographic algorithm to generate the One-Time Password.
          example: GJTGC5LUNA
        digits:
          type:
            - integer
            - 'null'
          example: 6
          description: The number of digits of the generated One-Time Password
        algorithm:
          type:
            - string
            - 'null'
          enum:
            - sha1
            - sha256
            - sha512
            - md5
          example: sha1
          description: The algorithm used to generate the One-Time Password
          default: sha1
        period:
          type:
            - integer
            - 'null'
          default: 30
          example: 30
          description: 'For TOTP only: The validity duration of One-Time Password generated for the account'
        counter:
          type:
            - integer
            - 'null'
          example: 15
          description: 'for HOTP only: The value of the counter used to synchronize the account with its verification servers'
          default: 0
        group_id:
          type:
            - integer
            - 'null'
          description: The ID of the group the 2FA account belongs to
          minimum: 0
        notes:
          type:
            - string
            - 'null'
          description: Optional free-form notes for the account. Encrypted at rest when E2EE is enabled.
          maxLength: 1024
        recovery_codes:
          type:
            - string
            - 'null'
          description: 'JSON-encoded array of the account''s external-service backup codes (e.g. GitHub recovery codes). Encrypted at rest; under E2EE the client sends an opaque ciphertext blob. Omit on store/update to preserve the existing value, send null/empty to clear it.'
          example: '["abcd-1234","efgh-5678"]'
      required:
        - account
        - otp_type
    2FAccountRead:
      allOf:
        - type: object
          properties:
            id:
              type:
                - integer
                - 'null'
              example: 1
              description: ID of the 2FA account
              minimum: 1
            last_used_at:
              type:
                - string
                - 'null'
              format: date-time
              description: ISO8601 timestamp of last use
            tags:
              type: array
              description: Tags assigned to this account
              items:
                $ref: '#/components/schemas/TagRead'
            is_pinned:
              type: boolean
              default: false
              description: Whether the account is pinned (favorited) to the top of the list
          required:
            - id
        - $ref: '#/components/schemas/2FAccountStore'
    Encrypted2FAccountRead:
      allOf:
        - type: object
          properties:
            id:
              type:
                - integer
                - 'null'
              example: 1
              description: ID of the 2FA account
              minimum: 1
            encrypted:
              type: boolean
              example: true
              description: Indicates the secret field contains encrypted ciphertext JSON instead of plaintext secret material
          required:
            - id
            - encrypted
        - type: object
          properties:
            group_id:
              type:
                - integer
                - 'null'
              description: The ID of the group the 2FA account belongs to
              minimum: 0
            service:
              type:
                - string
                - 'null'
              description: The Issuer of the 2FA account
              example: MySite
            account:
              type: string
              description: The Label of the 2FA account
              example: john.doe
            otp_type:
              type: string
              enum:
                - totp
                - hotp
                - steamtotp
              example: totp
            secret:
              type:
                - string
                - 'null'
              description: Raw ciphertext JSON string with ciphertext, iv, and authTag fields
              example: '{"ciphertext":"Y2lwaGVydGV4dA==","iv":"aW5pdGlhbGl6YXRpb25WZWN0b3I=","authTag":"YXV0aFRhZw=="}'
            digits:
              type: integer
              example: 6
            algorithm:
              type: string
              enum:
                - sha1
                - sha256
                - sha512
                - md5
              example: sha1
            period:
              type:
                - integer
                - 'null'
              example: 30
            counter:
              type:
                - integer
                - 'null'
              example: 15
          required:
            - group_id
            - service
            - account
            - otp_type
            - secret
            - digits
            - algorithm
            - period
            - counter
    Encrypted2FAccountCollection:
      title: Encrypted 2FA Accounts Collection schema
      description: An array of encrypted 2FA accounts
      type: array
      items:
        $ref: '#/components/schemas/Encrypted2FAccountRead'
    EncryptionInfo:
      title: Encryption info schema
